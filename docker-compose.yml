# version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: byod-backend
    environment:
      DB_PATH: /data/byod.duckdb
    volumes:
      - byod-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: byod-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  byod-data:
    driver: local
